services:
  api:
    build: ./ml-service-python
    container_name: insureguard-api
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  dashboard:
    build: ./dashboard
    container_name: insureguard-dashboard
    ports:
      - "8501:8501"
    environment:
      INSUREGUARD_API_URL: http://api:8000/predict
      INSUREGUARD_HEALTH_URL: http://api:8000/health
    depends_on:
      api:
        condition: service_healthy
